name: Run Tests
on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu_latest

    steps:
      - uses: actions/checkout@v4
      - name: Setuo JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

            # 3. ADIM: İzinleri ayarla
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew # 'run' ile Linux komutu çalıştırdık.

      # 4. ADIM: UNIT TESTLERİ KOŞTUR (Sürecin kalbi)
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest # Eğer test fail olursa CI burada durur!